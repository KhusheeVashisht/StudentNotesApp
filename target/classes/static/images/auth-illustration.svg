<svg width="280" height="280" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clipboard body -->
  <rect x="30" y="50" width="160" height="200" rx="16" fill="#FCD34D" stroke="#1F2937" stroke-width="8"/>
  
  <!-- Clipboard clip -->
  <rect x="90" y="30" width="40" height="50" rx="8" fill="#1F2937"/>
  <circle cx="100" cy="35" r="4" fill="#ffffff"/>
  <circle cx="120" cy="35" r="4" fill="#ffffff"/>
  
  <!-- Lines on clipboard -->
  <line x1="50" y1="90" x2="170" y2="90" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="120" x2="170" y2="120" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="150" x2="150" y2="150" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="180" x2="140" y2="180" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Pencil body -->
  <g transform="translate(160, 80) rotate(30)">
    <rect x="0" y="-12" width="100" height="24" rx="12" fill="#E63946"/>
    <polygon points="100,-8 120,0 100,8" fill="#E63946"/>
    
    <!-- Pencil tip -->
    <polygon points="120,0 135,-6 135,6" fill="#000000"/>
    
    <!-- Pencil eraser -->
    <rect x="-15" y="-12" width="15" height="24" rx="4" fill="#EF476F"/>
  </g>
  
  <!-- Border styling -->
  <rect x="30" y="50" width="160" height="200" rx="16" fill="none" stroke="#1F2937" stroke-width="8"/>
</svg>
