<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Notes</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="page-wrapper auth-page">
        <div class="auth-container">
            <section class="hero-card">
                <span class="eyebrow">Welcome Back</span>
                <h1>Login to Your Notes Dashboard</h1>
                <p>If you already have an account, sign in to access your protected notes API dashboard.</p>
                <div class="hero-image">
                    <img src="/images/auth-illustration.svg" alt="Student notes illustration">
                </div>
                <div class="hero-footer">
                    <span>Need an account?</span>
                    <a href="/register.html">Register here</a>
                </div>
            </section>
            <section class="form-card">
                <div class="form-header">
                    <h2>Login</h2>
                    <p>Enter your credentials to continue.</p>
                </div>
                <div id="alert" class="alert" style="display:none;"></div>
                <form id="loginForm">
                    <label>
                        Username
                        <input id="username" type="text" placeholder="Username" required>
                    </label>
                    <label>
                        Password
                        <input id="password" type="password" placeholder="Password" required>
                    </label>
                    <button type="submit">Login</button>
                </form>
            </section>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
